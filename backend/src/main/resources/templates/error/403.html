<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>403 - Доступ запрещен</title>
    <link th:href="@{/css/error.css}" rel="stylesheet">
</head>
<body>
<div class="error-container">
    <h1 th:text="${error}">403 - Доступ запрещен</h1>
    <p th:text="${message}">У вас нет прав для просмотра этой страницы</p>
    <a href="/" class="btn">Вернуться на главную</a>
</div>
</body>
</html>
