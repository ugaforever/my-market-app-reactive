<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Корзина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">
<div class="container p-2">
    <!-- Шапка с навигацией -->
    <div class="row p-2">
        <div class="col">
            <div class="hstack gap-3">
                <h2>
                    <span class="badge text-bg-success">Корзина</span>
                </h2>
                <a href="/orders" class="btn btn-secondary ms-auto bi bi-file-earmark-text"> Заказы</a>
                <a href="/items" class="btn btn-secondary bi bi-arrow-left-square"> Главная</a>
            </div>
        </div>
    </div>

    <!-- Список товаров в корзине -->
    <div class="row p-2" th:each="item : ${items}">
        <div class="col">
            <div class="card">
                <img class="p-2" th:src="${'/' + item.imgPath}" alt="Нет изображения" width="300" height="300">
                <div class="card-body">
                    <h5 class="card-title" th:text="${item.title}"></h5>
                    <h5>
                        <span class="badge text-bg-success" th:text="${item.price} + ' руб.'"></span>
                    </h5>
                    <p class="card-text" th:text="${item.description}"></p>

                    <!-- Кнопки действий - отдельные формы для каждого действия -->
                    <div class="hstack gap-3">
                        <!-- Форма MINUS -->
                        <form th:action="@{'/items/' + ${item.id} + '/minus'}" method="post">
                            <button type="submit" class="btn btn-outline-secondary">-</button>
                        </form>

                        <span th:text="${item.count}"></span>

                        <!-- Форма PLUS -->
                        <form th:action="@{'/items/' + ${item.id} + '/plus'}" method="post">
                            <button type="submit" class="btn btn-outline-secondary">+</button>
                        </form>

                        <!-- Форма DELETE -->
                        <form th:action="@{'/items/' + ${item.id} + '/delete'}" method="post" class="ms-auto">
                            <button type="submit" class="btn btn-danger bi bi-trash"> Удалить</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Итого и кнопка покупки -->
    <div class="row p-2" th:if="${!items.isEmpty()}">
        <div class="col">
            <div class="hstack gap-3">
                <h2 th:text="'Итого: ' + ${total} + ' руб.'"></h2>
                <form action="/buy" method="post" class="ms-auto">
                    <button class="btn btn-warning" type="submit">Купить</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Сообщение о пустой корзине -->
    <div class="row p-2" th:if="${items.isEmpty()}">
        <div class="col">
            <div class="alert alert-info text-center">
                Корзина пуста
            </div>
            <div class="text-center">
                <a href="/items" class="btn btn-primary">Перейти к покупкам</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
</body>

</html>
