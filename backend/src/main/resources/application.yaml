server:
  port: 9090

spring:
  application:
    name: market-backend

  redis:
    host: localhost
    port: 6379
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false

  r2dbc:
    url: r2dbc:h2:mem:///marketdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
  sql:
    init:
      mode: always
      platform: h2

logging:
  level:
    org.springframework.web: DEBUG
    ru.ugaforever.my_market_app: DEBUG
