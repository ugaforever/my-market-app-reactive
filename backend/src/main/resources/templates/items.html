<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Витрина магазина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">
<!-- Основная форма для поиска и фильтрации (GET на /items) -->
<form id="mainForm" th:action="@{/items}" method="get">
    <input type="hidden" name="pageNumber" th:value="${paging.number + 1}" id="pageNumberInput">
</form>

<div class="container p-2">
    <!-- Шапка с навигацией -->
    <div class="row p-2">
        <div class="col">
            <div class="hstack gap-3">
                <h2>
                    <span class="badge text-bg-success">Витрина магазина</span>
                </h2>
                <a href="/orders" class="btn btn-secondary ms-auto bi bi-file-earmark-text"> Заказы</a>
                <a href="/cart/items" class="btn btn-secondary bi bi-cart4"> Корзина</a>
                <a href="/items" class="btn btn-secondary bi bi-arrow-left-square"> Главная</a>
            </div>
        </div>
    </div>

    <!-- Поиск и сортировка (GET параметры для главной) -->
    <div class="row p-2">
        <div class="col">
            <div class="hstack gap-3">
                <input class="form-control me-2" type="search" placeholder="Найти..."
                       aria-label="Поиск" name="search" th:value="${search}" form="mainForm"/>
                <button class="btn btn-outline-success" type="submit" form="mainForm">Найти</button>

                <div class="form-floating w-25">
                    <select class="form-select" id="sort" name="sort"
                            onchange="document.getElementById('mainForm').submit()" form="mainForm">
                        <option value="NO" th:selected="${sort=='NO'}">нет</option>
                        <option value="ALPHA" th:selected="${sort=='ALPHA'}">по алфавиту</option>
                        <option value="PRICE" th:selected="${sort=='PRICE'}">по цене</option>
                    </select>
                    <label for="sort">Сортировка</label>
                </div>

                <div class="form-floating w-25">
                    <select class="form-select" id="pageSize" name="pageSize"
                            onchange="document.getElementById('mainForm').submit()" form="mainForm">
                        <option value="2" th:selected="${paging.size==2}">2</option>
                        <option value="5" th:selected="${paging.size==5}">5</option>
                        <option value="10" th:selected="${paging.size==10}">10</option>
                        <option value="20" th:selected="${paging.size==20}">20</option>
                        <option value="50" th:selected="${paging.size==50}">50</option>
                        <option value="100" th:selected="${paging.size==100}">100</option>
                    </select>
                    <label for="pageSize">На странице</label>
                </div>
            </div>
        </div>
    </div>

    <!-- Список товаров -->
    <div class="row p-2" th:each="itemsRow : ${items}">
        <div class="col" th:each="item : ${itemsRow}">
            <div class="card h-100" th:if="${item.id != -1}">
                <a th:href="@{'/items/' + ${item.id}}">
                    <img th:src="${'/' + item.imgPath}" class="card-img-top" alt="Нет изображения" style="height: 200px; object-fit: cover;">
                </a>
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${item.title}">Название</h5>
                    <h5>
                        <span class="badge text-bg-success" th:text="${item.price} + ' руб.'"></span>
                    </h5>
                    <p class="card-text flex-grow-1" th:text="${item.description}">Описание</p>

                    <!-- Кнопки действий - каждая отправляет POST на отдельный URL, но после действия возвращаемся на главную -->
                    <div class="hstack gap-3 mt-3">
                        <!-- MINUS -->
                        <form th:action="@{'/items/' + ${item.id} + '/minus'}" method="post">
                            <input type="hidden" name="redirectUrl" value="/items">
                            <input type="hidden" name="search" th:value="${search}">
                            <input type="hidden" name="sort" th:value="${sort}">
                            <input type="hidden" name="pageNumber" th:value="${paging.number + 1}">
                            <input type="hidden" name="pageSize" th:value="${paging.size}">
                            <button type="submit" class="btn btn-outline-secondary">-</button>
                        </form>

                        <span th:text="${item.count}"></span>

                        <!-- PLUS -->
                        <form th:action="@{'/items/' + ${item.id} + '/plus'}" method="post">
                            <input type="hidden" name="redirectUrl" value="/items">
                            <input type="hidden" name="search" th:value="${search}">
                            <input type="hidden" name="sort" th:value="${sort}">
                            <input type="hidden" name="pageNumber" th:value="${paging.number + 1}">
                            <input type="hidden" name="pageSize" th:value="${paging.size}">
                            <button type="submit" class="btn btn-outline-secondary">+</button>
                        </form>

                        <!-- ADD (только если товара нет в корзине) -->
                        <form th:if="${item.count == 0}"
                              th:action="@{'/items/' + ${item.id} + '/add'}"
                              method="post"
                              class="ms-auto">
                            <input type="hidden" name="redirectUrl" value="/items">
                            <input type="hidden" name="search" th:value="${search}">
                            <input type="hidden" name="sort" th:value="${sort}">
                            <input type="hidden" name="pageNumber" th:value="${paging.number + 1}">
                            <input type="hidden" name="pageSize" th:value="${paging.size}">
                            <button type="submit" class="btn btn-warning bi bi-cart4"> В корзину</button>
                        </form>
                    </div>
                </div>
            </div>
            <div th:unless="${item.id != -1}" class="card invisible">&nbsp;</div>
        </div>
    </div>

    <!-- Пагинация (GET параметры для главной) -->
    <div class="row p-2">
        <div class="col">
            <div class="hstack gap-3 justify-content-center">
                <!-- Кнопка "Предыдущая" -->
                <button type="submit" class="btn btn-light" th:if="${paging.hasPrevious()}"
                        name="pageNumber" th:value="${paging.number}"
                        form="mainForm" onclick="document.getElementById('pageNumberInput').value=this.value">
                    &larr;
                </button>

                <span th:text="'Страница: ' + (${paging.number} + 1)"></span>

                <!-- Кнопка "Следующая" -->
                <button type="submit" class="btn btn-light" th:if="${paging.hasNext()}"
                        name="pageNumber" th:value="${paging.number + 2}"
                        form="mainForm" onclick="document.getElementById('pageNumberInput').value=this.value">
                    &rarr;
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
</body>

</html>
